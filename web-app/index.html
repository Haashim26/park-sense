<!DOCTYPE html>
<html>
<head>
  <title>ParkSense – Smart Parking</title>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <!-- Leaflet -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
  <link rel="stylesheet" href="https://unpkg.com/leaflet-routing-machine/dist/leaflet-routing-machine.css"/>

  <!-- Fonts: Rajdhani (technical/signage display face), Inter (body), IBM Plex Mono (live data readouts) -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@600;700&family=Inter:wght@400;500;600&family=IBM+Plex+Mono:wght@500;600&display=swap" rel="stylesheet">

  <style>
    :root {
      --navy: #16202B;
      --navy-soft: #232F3B;
      --amber: #F2A93B;
      --amber-dark: #C97F1E;
      --green: #1F9D55;
      --green-bg: #E4F7EC;
      --red: #D64545;
      --red-bg: #FCE8E8;
      --line: #E7E2D8;
      --text-muted: #5B6672;
      --panel-bg: #FFFFFF;

      --font-display: 'Rajdhani', sans-serif;
      --font-body: 'Inter', sans-serif;
      --font-mono: 'IBM Plex Mono', monospace;

      --radius: 14px;
      --shadow: 0 4px 20px rgba(22, 32, 43, 0.14);
    }

    * { box-sizing: border-box; }
    body { margin: 0; font-family: var(--font-body); color: var(--navy); }
    #map { height: 100vh; }

    /* Hide the default (cluttered) turn-by-turn panel — we show our own summary instead */
    .leaflet-routing-container { display: none; }

    /* Push Leaflet's zoom control down so it doesn't sit behind the brand bar */
    .leaflet-control-container .leaflet-top { margin-top: 56px; }

    /* 🅿️ Top brand bar */
    .topbar {
      position: absolute;
      top: 0; left: 0; right: 0;
      z-index: 1000;
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 12px 18px;
      background: linear-gradient(to bottom, rgba(22,32,43,0.9), rgba(22,32,43,0.5) 80%, rgba(22,32,43,0));
    }
    .topbar .brand {
      font-family: var(--font-display);
      font-weight: 700;
      font-size: 22px;
      letter-spacing: 0.5px;
      color: white;
      text-shadow: 0 1px 4px rgba(0,0,0,0.4);
      flex-shrink: 0;
    }
    .topbar .brand .p {
      color: var(--amber);
    }

    /* 🔍 Search bar */
    .search-wrap {
      position: relative;
      flex: 1;
      max-width: 360px;
    }
    .search-wrap input {
      width: 100%;
      border: none;
      border-radius: 999px;
      padding: 9px 16px;
      font-family: var(--font-body);
      font-size: 13.5px;
      background: rgba(255,255,255,0.95);
      color: var(--navy);
      box-shadow: var(--shadow);
    }
    .search-wrap input:focus { outline: 2px solid var(--amber); }
    .search-wrap input::placeholder { color: var(--text-muted); }
    .search-results {
      display: none;
      position: absolute;
      top: calc(100% + 6px);
      left: 0; right: 0;
      background: var(--panel-bg);
      border-radius: 10px;
      box-shadow: var(--shadow);
      border: 1px solid var(--line);
      max-height: 280px;
      overflow-y: auto;
    }
    .search-result-row {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 10px 14px;
      cursor: pointer;
      font-size: 13px;
      border-bottom: 1px solid var(--line);
    }
    .search-result-row:last-child { border-bottom: none; }
    .search-result-row:hover { background: #f5f3ee; }
    .search-result-row .sr-icon { flex-shrink: 0; }
    .search-result-row .sr-name {
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .search-loading, .search-empty {
      padding: 12px 14px;
      font-size: 13px;
      color: var(--text-muted);
    }

    /* Wrapper stacks legend + speed badge with column-reverse, so whichever is
       present sits at the bottom and others stack upward automatically —
       impossible for them to overlap regardless of content height changes. */
    .bottom-left-stack {
      position: absolute;
      bottom: 20px;
      left: 20px;
      z-index: 1000;
      display: flex;
      flex-direction: column-reverse;
      align-items: flex-start;
      gap: 10px;
    }

    /* 🚗 Live speed HUD badge — the signature element, styled like a car speedometer */
    .speed-badge {
      background: var(--navy);
      color: var(--amber);
      border-radius: 999px;
      padding: 10px 18px;
      font-family: var(--font-mono);
      font-weight: 600;
      font-size: 15px;
      box-shadow: var(--shadow);
      display: none;
      align-items: baseline;
      gap: 6px;
      letter-spacing: 0.5px;
    }
    .speed-badge .value { font-size: 20px; }
    .speed-badge .unit { font-size: 11px; color: rgba(242,169,59,0.7); font-family: var(--font-body); }

    /* 🗺️ Legend */
    .legend {
      background: var(--panel-bg);
      border-radius: 10px;
      padding: 10px 14px;
      font-family: var(--font-body);
      font-size: 12px;
      color: var(--navy);
      box-shadow: var(--shadow);
      border: 1px solid var(--line);
      display: flex;
      flex-direction: column;
      gap: 5px;
    }
    .legend .row { display: flex; align-items: center; gap: 7px; }
    .legend .dot { width: 10px; height: 10px; border-radius: 50%; display: inline-block; flex-shrink: 0; }

    /* 🔘 Floating round action buttons (recenter, feedback) */
    .fab {
      position: absolute;
      z-index: 1000;
      width: 44px; height: 44px;
      border-radius: 50%;
      border: 1px solid var(--line);
      background: var(--panel-bg);
      color: var(--navy);
      cursor: pointer;
      box-shadow: var(--shadow);
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.15s, transform 0.15s;
    }
    .fab svg { width: 20px; height: 20px; }
    .fab:hover { background: #f5f3ee; transform: scale(1.05); }
    .recenter-fab { bottom: 78px; right: 20px; }
    .feedback-fab { bottom: 20px; right: 20px; }
    .areas-fab { bottom: 136px; right: 20px; }

    /* 📋 Nearby areas panel */
    .areas-panel {
      display: none;
      position: absolute;
      top: 68px;
      left: 14px;
      z-index: 1000;
      background: var(--panel-bg);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      border: 1px solid var(--line);
      width: 250px;
      max-height: 60vh;
      overflow-y: auto;
    }
    .areas-panel.open { display: block; }
    .areas-panel-title {
      font-family: var(--font-display);
      font-weight: 700;
      font-size: 15px;
      padding: 14px 16px 8px;
      color: var(--navy);
    }
    .area-row {
      padding: 10px 16px;
      cursor: pointer;
      border-top: 1px solid var(--line);
    }
    .area-row:hover { background: #f5f3ee; }
    .area-row-name {
      font-family: var(--font-body);
      font-weight: 600;
      font-size: 13.5px;
      color: var(--navy);
      margin-bottom: 3px;
    }
    .area-row-meta {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .area-row-dist {
      font-family: var(--font-mono);
      font-size: 11.5px;
      color: var(--text-muted);
    }
    .area-row-free {
      font-family: var(--font-mono);
      font-size: 11.5px;
      font-weight: 600;
      padding: 2px 7px;
      border-radius: 999px;
    }
    .area-row-free.ok { background: var(--green-bg); color: var(--green); }
    .area-row-free.full { background: var(--red-bg); color: var(--red); }
    .areas-empty { padding: 14px 16px; font-size: 13px; color: var(--text-muted); }

    /* 🅿️ Live destination status — shown in route-summary and nav-banner while
       a route/nav is active, so a slot taken by someone else mid-drive is visible */
    .dest-status {
      margin-top: 10px;
      padding-top: 10px;
      border-top: 1px solid var(--line);
    }
    .dest-status-title {
      font-family: var(--font-body);
      font-weight: 600;
      font-size: 12.5px;
      color: var(--text-muted);
      margin-bottom: 6px;
    }
    .dest-chips { display: flex; gap: 6px; flex-wrap: wrap; }
    .dest-chip {
      font-family: var(--font-mono);
      font-size: 12px;
      font-weight: 600;
      padding: 3px 8px;
      border-radius: 999px;
    }
    .dest-chip.ok { background: var(--green-bg); color: var(--green); }
    .dest-chip.full { background: var(--red-bg); color: var(--red); }

    .nav-dest-status {
      display: flex;
      gap: 6px;
      justify-content: center;
      flex-wrap: wrap;
      margin-top: 8px;
    }

    /* 💬 Feedback modal */
    .feedback-modal {
      display: none;
      position: absolute;
      inset: 0;
      z-index: 2000;
      background: rgba(22,32,43,0.55);
      align-items: center;
      justify-content: center;
    }
    .feedback-modal.open { display: flex; }
    .feedback-modal-inner {
      background: white;
      border-radius: var(--radius);
      padding: 22px;
      width: 320px;
      max-width: 88vw;
      box-shadow: var(--shadow);
    }
    .feedback-modal-inner .title {
      font-family: var(--font-display);
      font-weight: 700;
      font-size: 19px;
      margin-bottom: 4px;
    }
    .feedback-modal-inner .subtitle {
      font-size: 12.5px;
      color: var(--text-muted);
      margin-bottom: 12px;
    }
    .feedback-modal-inner textarea {
      width: 100%;
      min-height: 90px;
      border-radius: 9px;
      border: 1px solid var(--line);
      padding: 10px;
      font-family: var(--font-body);
      font-size: 14px;
      resize: vertical;
    }
    .feedback-modal-inner textarea:focus { outline: 2px solid var(--amber); border-color: transparent; }
    .feedback-actions { display: flex; gap: 8px; margin-top: 10px; }
    .feedback-actions button {
      flex: 1;
      border-radius: 8px;
      padding: 9px;
      cursor: pointer;
      font-family: var(--font-body);
      font-weight: 600;
      font-size: 14px;
      border: none;
    }
    .feedback-cancel { background: transparent; border: 1px solid var(--line) !important; color: var(--text-muted); }
    .feedback-submit { background: var(--green); color: white; }
    .feedback-status { margin-top: 8px; font-size: 13px; text-align: center; min-height: 16px; }

    .route-summary {
      position: absolute;
      top: 68px;
      right: 14px;
      z-index: 1000;
      background: var(--panel-bg);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 16px 18px;
      display: none;
      min-width: 210px;
      max-width: 270px;
      border: 1px solid var(--line);
    }
    .route-summary .title {
      font-family: var(--font-display);
      font-weight: 700;
      font-size: 17px;
      margin-bottom: 8px;
      color: var(--navy);
      letter-spacing: 0.3px;
    }
    .route-summary .stat {
      font-family: var(--font-mono);
      font-size: 13.5px;
      margin: 3px 0;
      color: var(--navy);
    }
    .route-summary .live-eta {
      font-family: var(--font-mono);
      font-size: 13.5px;
      margin: 3px 0;
      color: var(--amber-dark);
      font-weight: 600;
      display: none;
    }
    .route-summary .vehicle-etas {
      margin-top: 10px;
      padding-top: 10px;
      border-top: 1px solid var(--line);
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    .vehicle-row {
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .vehicle-row .v-icon {
      font-size: 18px;
      width: 22px;
      text-align: center;
      flex-shrink: 0;
    }
    .vehicle-row .v-info { flex: 1; min-width: 0; }
    .vehicle-row .v-label {
      font-family: var(--font-body);
      font-weight: 600;
      font-size: 13px;
      color: var(--navy);
    }
    .vehicle-row .v-sub {
      font-family: var(--font-mono);
      font-size: 10.5px;
      color: var(--text-muted);
    }
    .vehicle-row .v-time {
      font-family: var(--font-mono);
      font-weight: 600;
      font-size: 13px;
      color: var(--amber-dark);
      flex-shrink: 0;
      text-align: right;
    }
    .route-summary .alt-note {
      margin-top: 8px;
      font-size: 12px;
      color: var(--text-muted);
      font-style: italic;
      font-family: var(--font-body);
    }
    .route-summary .start-nav-btn {
      margin-top: 12px;
      background: var(--green);
      color: white;
      border: none;
      border-radius: 9px;
      padding: 10px 10px;
      cursor: pointer;
      font-family: var(--font-display);
      font-size: 15px;
      font-weight: 700;
      letter-spacing: 0.3px;
      width: 100%;
      transition: background 0.15s;
    }
    .route-summary .start-nav-btn:hover { background: #17803F; }
    .route-summary .clear-btn {
      margin-top: 8px;
      background: transparent;
      border: 1px solid var(--line);
      color: var(--text-muted);
      border-radius: 9px;
      padding: 7px 10px;
      cursor: pointer;
      font-family: var(--font-body);
      font-size: 13px;
      width: 100%;
      transition: background 0.15s;
    }
    .route-summary .clear-btn:hover { background: #f5f3ee; }

    .nav-banner {
      position: absolute;
      top: 74px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 1000;
      background: linear-gradient(165deg, #1a2530 0%, #131c25 100%);
      color: white;
      border-radius: var(--radius);
      padding: 16px 44px 16px 20px;
      display: none;
      min-width: 300px;
      max-width: 90vw;
      box-shadow: var(--shadow), inset 0 1px 0 rgba(255,255,255,0.06);
      border-top: 3px solid var(--amber);
    }
    .nav-close-btn {
      position: absolute;
      top: 12px; right: 12px;
      width: 26px; height: 26px;
      border-radius: 50%;
      border: none;
      background: rgba(255,255,255,0.08);
      color: rgba(255,255,255,0.75);
      font-size: 12px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.15s, color 0.15s;
    }
    .nav-close-btn:hover { background: var(--red); color: white; }

    .nav-main {
      display: flex;
      align-items: baseline;
      gap: 14px;
    }
    .nav-distance-big {
      font-family: var(--font-mono);
      font-weight: 600;
      font-size: 27px;
      color: var(--amber);
      flex-shrink: 0;
      min-width: 62px;
      text-shadow: 0 0 14px rgba(242,169,59,0.35);
    }
    .nav-instruction-text {
      font-family: var(--font-display);
      font-weight: 700;
      font-size: 17px;
      letter-spacing: 0.2px;
      line-height: 1.25;
    }
    .nav-banner .live-eta-nav {
      font-family: var(--font-mono);
      font-size: 11.5px;
      color: rgba(255,255,255,0.5);
      margin-top: 6px;
      margin-left: 76px;
      display: none;
    }
    .nav-dest-status {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-top: 12px;
      padding-top: 12px;
      border-top: 1px solid rgba(255,255,255,0.1);
    }
    .nav-dest-status .dest-chip {
      font-family: var(--font-mono);
      font-size: 11.5px;
    }
    .nav-dest-status .dest-chip.ok { background: rgba(46,204,113,0.16); color: #6EE7A8; }
    .nav-dest-status .dest-chip.full { background: rgba(231,76,60,0.16); color: #FF8A80; }

    .popup-body {
      margin: 10px 0;
      display: flex;
      flex-direction: column;
      gap: 7px;
      min-width: 190px;
    }
    .popup-row {
      display: flex;
      align-items: center;
      gap: 7px;
    }
    .popup-icon { font-size: 15px; width: 18px; text-align: center; flex-shrink: 0; }
    .popup-label {
      font-family: var(--font-body);
      font-size: 12.5px;
      color: var(--navy);
      width: 32px;
      flex-shrink: 0;
    }
    .popup-bar-track {
      flex: 1;
      height: 8px;
      background: #edeae2;
      border-radius: 4px;
      overflow: hidden;
    }
    .popup-bar-fill {
      height: 100%;
      border-radius: 4px;
      transition: width 0.3s ease;
    }
    .popup-count {
      font-family: var(--font-mono);
      font-size: 11.5px;
      font-weight: 700;
      white-space: nowrap;
      flex-shrink: 0;
      padding: 3px 8px;
      border-radius: 6px;
    }
    .popup-count.ok { background: var(--green-bg); color: var(--green); }
    .popup-count.full { background: var(--red-bg); color: var(--red); }

    .recommend {
      margin-top: 10px;
      padding: 7px;
      background: rgba(242,169,59,0.15);
      color: var(--amber-dark);
      border-radius: 8px;
      font-weight: 700;
      font-family: var(--font-display);
      font-size: 13px;
      letter-spacing: 0.3px;
      text-align: center;
    }

    .navigate-btn {
      margin-top: 12px;
      padding: 10px;
      background: var(--amber);
      color: var(--navy);
      border-radius: 9px;
      text-align: center;
      font-family: var(--font-display);
      font-weight: 700;
      font-size: 15px;
      letter-spacing: 0.3px;
      cursor: pointer;
      text-decoration: none;
      display: block;
      width: 100%;
      border: none;
      transition: background 0.15s;
    }
    .navigate-btn:hover {
      background: var(--amber-dark);
      color: white;
    }

    .leaflet-popup-content-wrapper {
      border-radius: 12px;
      font-family: var(--font-body);
    }
    .leaflet-popup-content b {
      font-family: var(--font-display);
      font-size: 16px;
      letter-spacing: 0.2px;
    }

    /* Custom pin markers — strip Leaflet's default divIcon white box/border */
    .parksense-pin {
      background: none !important;
      border: none !important;
    }
    @keyframes pinPulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.14); }
    }

    /* ⏳ Loading overlay — shown briefly while Firebase data + location resolve */
    .loading-overlay {
      position: absolute;
      inset: 0;
      z-index: 3000;
      background: var(--navy);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 14px;
      transition: opacity 0.4s ease;
    }
    .loading-overlay.hidden { opacity: 0; pointer-events: none; }
    .loading-overlay .spinner {
      width: 38px; height: 38px;
      border: 3px solid rgba(242,169,59,0.25);
      border-top-color: var(--amber);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    .loading-overlay .loading-text {
      font-family: var(--font-display);
      color: white;
      font-size: 16px;
      letter-spacing: 0.3px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>

<div class="topbar">
  <div class="brand"><span class="p">🅿️</span> Park<span class="p">Sense</span></div>
  <div class="search-wrap">
    <input type="text" id="searchInput" placeholder="Search places or parking areas…"
           onkeydown="if(event.key==='Enter') performSearch()">
    <div class="search-results" id="searchResults"></div>
  </div>
</div>

<div id="map"></div>

<div class="loading-overlay" id="loadingOverlay">
  <div class="spinner"></div>
  <div class="loading-text">Loading ParkSense…</div>
</div>

<div class="bottom-left-stack">
  <div class="legend">
    <div class="row"><span class="dot" style="background:#2ecc71"></span> Available</div>
    <div class="row"><span class="dot" style="background:#e74c3c"></span> Full</div>
    <div class="row"><span class="dot" style="background:#f1c40f"></span> Recommended</div>
  </div>

  <div class="speed-badge" id="speedBadge">
    <span class="value" id="speedValue">0</span><span class="unit">km/h</span>
  </div>
</div>

<button class="fab recenter-fab" onclick="recenterMap()" title="Recenter map">
  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"><circle cx="12" cy="12" r="3"/><path d="M12 2v3M12 19v3M2 12h3M19 12h3"/></svg>
</button>
<button class="fab areas-fab" onclick="toggleAreasList()" title="Nearby parking areas">
  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"><path d="M8 6h13M8 12h13M8 18h13"/><circle cx="3" cy="6" r="1"/><circle cx="3" cy="12" r="1"/><circle cx="3" cy="18" r="1"/></svg>
</button>
<button class="fab feedback-fab" onclick="toggleFeedback()" title="Send feedback">
  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M21 11.5a8.38 8.38 0 0 1-.9 3.8 8.5 8.5 0 0 1-7.6 4.7 8.38 8.38 0 0 1-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 0 1-.9-3.8 8.5 8.5 0 0 1 4.7-7.6 8.38 8.38 0 0 1 3.8-.9h.5a8.48 8.48 0 0 1 8 8v.5z"/></svg>
</button>

<div class="areas-panel" id="areasPanel">
  <div class="areas-panel-title">Parking areas near you</div>
  <div id="areasList"></div>
</div>

<div class="feedback-modal" id="feedbackModal">
  <div class="feedback-modal-inner">
    <div class="title">Send Feedback</div>
    <div class="subtitle">Found a bug, or have an idea? Let us know.</div>
    <textarea id="feedbackText" maxlength="500" placeholder="Tell us what you think..."></textarea>
    <div class="feedback-actions">
      <button class="feedback-cancel" onclick="toggleFeedback()">Cancel</button>
      <button class="feedback-submit" onclick="submitFeedback()">Send</button>
    </div>
    <div class="feedback-status" id="feedbackStatus"></div>
  </div>
</div>

<div class="route-summary" id="routeSummary">
  <div class="title">🧭 Route</div>
  <div class="stat" id="routeDistance"></div>
  <div class="stat" id="routeTime"></div>
  <div class="live-eta" id="liveEta"></div>
  <div class="vehicle-etas" id="vehicleEtas"></div>
  <div class="alt-note" id="altRoutesNote"></div>
  <div class="dest-status" id="destStatus"></div>
  <button class="start-nav-btn" onclick="startNavigation()">▶ Start Navigation</button>
  <button class="clear-btn" onclick="clearRoute()">✕ Clear Route</button>
</div>

<div class="nav-banner" id="navBanner">
  <button class="nav-close-btn" onclick="stopNavigation()" title="Stop navigation">✕</button>
  <div class="nav-main">
    <div class="nav-distance-big" id="navDistanceText">—</div>
    <div class="nav-instruction-text" id="navInstructionText">—</div>
  </div>
  <div class="live-eta-nav" id="liveEtaNav"></div>
  <div class="nav-dest-status" id="navDestStatus"></div>
</div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
<script src="https://unpkg.com/leaflet-routing-machine/dist/leaflet-routing-machine.js"></script>
<script src="config.js"></script>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { getDatabase, ref, onValue, push, set } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

  // 🗺️ Map — render this FIRST, so the page never goes fully blank even if Firebase fails below
  const map = L.map("map").setView([13.06, 80.25], 12);
  L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png").addTo(map);

  // 🔥 Firebase config — loaded from config.js (gitignored, not committed).
  // Copy config.example.js to config.js and fill in your credentials.
  let db = null;
  try {
    const firebaseConfig = window.FIREBASE_CONFIG;
    if (!firebaseConfig || !firebaseConfig.apiKey) {
      throw new Error("Firebase config missing — config.js didn't load or environment variables aren't set.");
    }
    const app = initializeApp(firebaseConfig);
    db = getDatabase(app);
  } catch (err) {
    console.error(err);
    const banner = document.createElement("div");
    banner.style.cssText = "position:absolute;top:12px;left:12px;z-index:1000;background:#fff3cd;color:#664d03;border:1px solid #ffe69c;border-radius:8px;padding:10px 14px;font-family:Arial,sans-serif;max-width:320px;";
    banner.textContent = "⚠️ Live parking data unavailable (Firebase config issue). Map is showing, but slot statuses won't update. Check console for details.";
    document.body.appendChild(banner);
  }

  // 🔒 Escapes text before inserting into innerHTML — applied to anything that
  // isn't a fixed string we wrote ourselves (area names, search results, etc.),
  // so a malicious/unexpected value can never execute as HTML.
  function escapeHtml(str) {
    return String(str)
      .replace(/&/g, "&amp;")
      .replace(/</g, "&lt;")
      .replace(/>/g, "&gt;")
      .replace(/"/g, "&quot;")
      .replace(/'/g, "&#39;");
  }

  // 🅿️ Single source of truth for how slot availability is worded — used in the
  // popup, destination status chips, and areas list. Plain language, no fractions
  // to interpret ("2 available" / "Full") — clearer than "X/Y" notation for anyone
  // glancing quickly, especially while driving.
  function formatSlotStatus(free, total) {
    if (free <= 0) return { text: "Full", cls: "full" };
    return { text: `${free} available`, cls: "ok" };
  }

  // 📍 User location — real browser geolocation, falls back to a default point if denied/unavailable
  let userLocation = { lat: 13.0600, lng: 80.2500 }; // fallback default
  let userMarker = null;

  // 🚀 Live speed tracking — uses GPS-reported speed where available (mostly mobile),
  // falls back to calculating it from consecutive position updates on desktop/laptop.
  let currentSpeedKmh = null;
  let lastSpeedFix = null; // { lat, lng, time }
  const speedSamples = []; // small rolling window to smooth out GPS jitter

  // Browser geolocation can drift a few meters between readings even while
  // completely stationary (especially indoors/WiFi-based positioning). Anything
  // smaller than this is treated as noise, not real movement.
  const MIN_MOVEMENT_METERS = 8;

  function updateSpeed(pos) {
    const now = Date.now();
    let speedKmh = 0;

    if (typeof pos.coords.speed === "number" && pos.coords.speed >= 0) {
      // Ignore small GPS-reported speed noise under ~1.8 km/h
      speedKmh = pos.coords.speed < 0.5 ? 0 : pos.coords.speed * 3.6;
    } else if (lastSpeedFix) {
      const dMeters = distance(lastSpeedFix.lat, lastSpeedFix.lng, pos.coords.latitude, pos.coords.longitude) * 1000;
      const dHours = (now - lastSpeedFix.time) / 3600000;
      if (dMeters >= MIN_MOVEMENT_METERS && dHours > 0) {
        speedKmh = (dMeters / 1000) / dHours;
      }
      // else: movement below the noise floor — treat as stationary (speedKmh stays 0)
    }
    lastSpeedFix = { lat: pos.coords.latitude, lng: pos.coords.longitude, time: now };

    if (speedKmh > 180) return; // ignore absurd GPS glitches, keep previous reading

    speedSamples.push(speedKmh);
    if (speedSamples.length > 4) speedSamples.shift();
    currentSpeedKmh = speedSamples.reduce((a, b) => a + b, 0) / speedSamples.length;

    const badge = document.getElementById("speedBadge");
    if (currentSpeedKmh > 2) { // hide badge while stationary — not meaningful sitting still
      document.getElementById("speedValue").textContent = Math.round(currentSpeedKmh);
      badge.style.display = "flex";
    } else {
      badge.style.display = "none";
    }
  }

  function placeUserMarker() {
    if (userMarker) userMarker.setLatLng([userLocation.lat, userLocation.lng]);
    else {
      userMarker = L.circleMarker([userLocation.lat, userLocation.lng], {
        radius: 8, color: "#0066ff", fillColor: "#3399ff", fillOpacity: 0.9
      }).addTo(map).bindPopup("📍 You are here");
    }
  }
  placeUserMarker();

  if (navigator.geolocation) {
    // Continuous tracking (not one-shot) so live speed + nearest-area + in-progress
    // navigation all stay accurate as the user actually moves.
    let lastAcceptedPosition = null; // filters GPS jitter while stationary — see MIN_MOVEMENT_METERS

    navigator.geolocation.watchPosition(
      pos => {
        updateSpeed(pos); // always feed the speed calc, even on rejected small movements — needed so it correctly decays toward 0

        const newLat = pos.coords.latitude, newLng = pos.coords.longitude;
        if (lastAcceptedPosition) {
          const movedMeters = distance(lastAcceptedPosition.lat, lastAcceptedPosition.lng, newLat, newLng) * 1000;
          if (movedMeters < MIN_MOVEMENT_METERS) return; // GPS noise while stationary — don't propagate into the UI
        }
        lastAcceptedPosition = { lat: newLat, lng: newLng };

        userLocation = { lat: newLat, lng: newLng };
        placeUserMarker();
        fitMapToEverything();
        if (activeNavRoute) {
          map.panTo([userLocation.lat, userLocation.lng]); // follow the user during turn-by-turn nav
        }
        if (latestAreas) { renderAreas(latestAreas); renderAreasList(latestAreas); } // keep nearest-area recommendation + distances current
        if (activeNavRoute) checkNavProgress(activeNavRoute); // keep live nav in sync
      },
      () => { /* permission denied or unavailable — keep fallback location silently */ },
      { enableHighAccuracy: true, timeout: 8000 }
    );
  }

  // Fits the map to show BOTH the user's real location and all parking markers together —
  // rather than blindly centering on just the user, which could push parking markers
  // (e.g. in Chennai) completely off-screen if testing from somewhere far away.
  let hasCenteredMap = false;
  function fitMapToEverything(force) {
    if (hasCenteredMap) return;
    const points = [[userLocation.lat, userLocation.lng]];
    if (latestAreas) {
      for (const areaId in latestAreas) {
        const area = latestAreas[areaId];
        if (area.lat && area.lng) points.push([area.lat, area.lng]);
      }
    }
    // Wait until we have both the user's location and the parking areas, unless forced
    // (fallback timeout below) — otherwise fit early with only one point and never revisit.
    if (points.length > 1 || force) {
      hasCenteredMap = true;
      map.fitBounds(points, { padding: [60, 60], maxZoom: 14 });
    }
  }
  setTimeout(() => fitMapToEverything(true), 5000); // fallback if one side never arrives

  window.recenterMap = function () {
    hasCenteredMap = false;
    fitMapToEverything(true);
  };

  // 🔍 Search — checks local parking area names first, then falls back to
  // OpenStreetMap's free Nominatim geocoder for general place search (no API key).
  // Runs only on Enter/click (not per-keystroke), plus a short cooldown, to stay
  // light on the free service — this is considerate-use throttling, not security.
  let lastSearchTime = 0;
  window.performSearch = async function () {
    const now = Date.now();
    if (now - lastSearchTime < 1000) return; // ignore rapid repeat submissions
    lastSearchTime = now;

    const query = document.getElementById("searchInput").value.trim();
    const resultsEl = document.getElementById("searchResults");
    if (!query) { resultsEl.style.display = "none"; return; }

    resultsEl.innerHTML = `<div class="search-loading">Searching…</div>`;
    resultsEl.style.display = "block";

    const localMatches = [];
    if (latestAreas) {
      for (const areaId in latestAreas) {
        const area = latestAreas[areaId];
        const name = area.name || areaId;
        if (name.toLowerCase().includes(query.toLowerCase()) && area.lat && area.lng) {
          localMatches.push({ type: "area", areaId, name, lat: area.lat, lng: area.lng });
        }
      }
    }

    let placeMatches = [];
    try {
      const resp = await fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(query)}&limit=5`);
      const data = await resp.json();
      placeMatches = data.map(d => ({ type: "place", name: d.display_name, lat: parseFloat(d.lat), lng: parseFloat(d.lon) }));
    } catch (err) {
      console.error(err);
    }

    const allResults = [...localMatches, ...placeMatches];
    window._searchResults = allResults;

    if (!allResults.length) {
      resultsEl.innerHTML = `<div class="search-empty">No results found.</div>`;
      return;
    }

    resultsEl.innerHTML = allResults.map((r, i) => `
      <div class="search-result-row" onclick="selectSearchResult(${i})">
        <span class="sr-icon">${r.type === "area" ? "🅿️" : "📍"}</span>
        <span class="sr-name">${escapeHtml(r.name)}</span>
      </div>
    `).join("");
  };

  window.selectSearchResult = function (i) {
    const r = (window._searchResults || [])[i];
    if (!r) return;
    map.setView([r.lat, r.lng], 15);
    if (r.type === "area" && markers[r.areaId]) markers[r.areaId].openPopup();
    document.getElementById("searchResults").style.display = "none";
    document.getElementById("searchInput").value = "";
  };

  // 📋 Nearby areas list — solves "markers are off-screen when zoomed into my
  // own location" by surfacing every known area with live distance + availability,
  // regardless of what's currently visible on the map.
  window.toggleAreasList = function () {
    document.getElementById("areasPanel").classList.toggle("open");
  };

  window.flyToArea = function (areaId) {
    const area = latestAreas && latestAreas[areaId];
    if (!area || !area.lat || !area.lng) return;
    map.setView([area.lat, area.lng], 15);
    if (markers[areaId]) markers[areaId].openPopup();
    document.getElementById("areasPanel").classList.remove("open");
  };

  function renderAreasList(areas) {
    if (!areas) return;
    const rows = Object.entries(areas)
      .filter(([id, a]) => a.lat && a.lng && a.slots)
      .map(([id, a]) => {
        const d = distance(userLocation.lat, userLocation.lng, a.lat, a.lng);
        let free = 0, total = 0;
        for (const s in a.slots) { total++; if (a.slots[s].status === "free") free++; }
        return { id, name: a.name || id, lat: a.lat, lng: a.lng, dist: d, free, total };
      })
      .sort((a, b) => a.dist - b.dist);

    document.getElementById("areasList").innerHTML = rows.map(r => {
      const status = formatSlotStatus(r.free, r.total);
      return `
      <div class="area-row" onclick="flyToArea('${escapeHtml(r.id)}')">
        <div class="area-row-name">${escapeHtml(r.name)}</div>
        <div class="area-row-meta">
          <span class="area-row-dist">${r.dist < 1 ? Math.round(r.dist * 1000) + " m away" : r.dist.toFixed(1) + " km away"}</span>
          <span class="area-row-free ${status.cls}">${status.text}</span>
        </div>
      </div>`;
    }).join("") || `<div class="areas-empty">No parking areas found.</div>`;
  }

  // 🅿️ Live destination status — shown in both the route panel and nav banner
  // while a route/nav is active, refreshed on every Firebase update so a slot
  // taken by someone else mid-drive is reflected immediately, not just at click time.
  let activeDestinationAreaId = null;
  let activeDestinationName = null;

  function updateDestinationStatusUI() {
    if (!activeDestinationAreaId || !latestAreas || !latestAreas[activeDestinationAreaId]) return;
    const area = latestAreas[activeDestinationAreaId];

    let counts = { bike: { free: 0, total: 0 }, car: { free: 0, total: 0 }, van: { free: 0, total: 0 } };
    for (const s in area.slots) {
      const slot = area.slots[s];
      counts[slot.type].total++;
      if (slot.status === "free") counts[slot.type].free++;
    }
    const chip = (icon, c) => {
      const status = formatSlotStatus(c.free, c.total);
      return `<span class="dest-chip ${status.cls}">${icon} ${status.text}</span>`;
    };
    const chipsHtml = `${chip("🏍️", counts.bike)}${chip("🚗", counts.car)}${chip("🚐", counts.van)}`;

    const summaryEl = document.getElementById("destStatus");
    if (summaryEl) {
      summaryEl.innerHTML = `<div class="dest-status-title">📍 ${escapeHtml(activeDestinationName || "")} — live status</div><div class="dest-chips">${chipsHtml}</div>`;
    }
    const navEl = document.getElementById("navDestStatus");
    if (navEl) navEl.innerHTML = chipsHtml;
  }

  // ⏱️ Formats minutes as "45 min", "2h 15m", or "1d 4h" depending on scale
  function formatDuration(mins) {
    if (mins < 60) return `${Math.round(mins)} min`;
    if (mins < 1440) {
      const h = Math.floor(mins / 60);
      const m = Math.round(mins % 60);
      return `${h}h ${m}m`;
    }
    const d = Math.floor(mins / 1440);
    const h = Math.round((mins % 1440) / 60);
    return `${d}d ${h}h`;
  }

  // 📏 Formats meters as "120 m" or "1.4 km" depending on scale
  function formatDistance(meters) {
    if (meters < 1000) return `${Math.round(meters)} m`;
    return `${(meters / 1000).toFixed(1)} km`;
  }

  // 💬 Feedback — writes to a public, write-only "feedback" node (validated server-side
  // via firebase-rules.json: non-empty, max 500 chars). Not readable by other visitors.
  window.toggleFeedback = function () {
    document.getElementById("feedbackModal").classList.toggle("open");
    document.getElementById("feedbackStatus").textContent = "";
  };

  let lastFeedbackTime = 0;
  window.submitFeedback = function () {
    const text = document.getElementById("feedbackText").value.trim();
    const statusEl = document.getElementById("feedbackStatus");

    if (!text) {
      statusEl.style.color = "var(--red)";
      statusEl.textContent = "Please write something first.";
      return;
    }
    if (Date.now() - lastFeedbackTime < 5000) {
      statusEl.style.color = "var(--red)";
      statusEl.textContent = "Please wait a few seconds before sending again.";
      return;
    }
    if (!db) {
      statusEl.style.color = "var(--red)";
      statusEl.textContent = "Feedback is unavailable right now.";
      return;
    }

    lastFeedbackTime = Date.now();
    const submitBtn = document.querySelector(".feedback-submit");
    submitBtn.disabled = true;

    set(push(ref(db, "feedback")), { message: text, timestamp: Date.now() })
      .then(() => {
        statusEl.style.color = "var(--green)";
        statusEl.textContent = "Thanks for your feedback!";
        document.getElementById("feedbackText").value = "";
        setTimeout(() => toggleFeedback(), 1200);
      })
      .catch(err => {
        console.error(err);
        statusEl.style.color = "var(--red)";
        statusEl.textContent = "Couldn't send — please try again.";
      })
      .finally(() => { submitBtn.disabled = false; });
  };

  // 🧭 Routing — using the raw OSRM router (not the full L.Routing.control UI) so we
  // have full control over alternate routes, per-vehicle ETA, and live turn-by-turn nav.
  // Uses OSRM's free public server — no API key, but no real-time traffic data either
  // (ETAs are distance/speed estimates, not traffic-aware like Google).
  const osrmRouter = L.Routing.osrmv1({
    serviceUrl: "https://router.project-osrm.org/route/v1",
    profile: "driving",
    alternatives: true
  });

  // Assumed average speeds (km/h) — used to estimate ETA per vehicle type,
  // since OSRM only returns a single generic driving time.
  const VEHICLE_SPEEDS = { bike: 25, car: 35, van: 30 };

  let routeLayers = [];      // polylines for all found routes (primary + alternates)
  let foundRoutes = [];      // raw route data from OSRM
  let selectedRouteIndex = 0;
  let activeNavRoute = null; // set while "Start Navigation" is active; read by the continuous location watcher
  let navCurrentStepIndex = 0;

  // Builds plain directional phrasing ("Turn right onto NH44", "Continue straight") from
  // the raw OSRM maneuver type — deliberately ignores any pre-baked compass-direction text
  // like "Head west", which isn't how a driver actually wants instructions phrased.
  function formatInstruction(instr, isFirst) {
    if (!instr) return "Continue straight";

    const road = instr.road ? ` onto ${instr.road}` : "";
    const type = (instr.type || "").toLowerCase();

    if (isFirst) return `Start driving${road}`;
    if (type.includes("sharpleft"))            return `Sharp left turn${road}`;
    if (type.includes("sharpright"))           return `Sharp right turn${road}`;
    if (type.includes("slightleft"))           return `Slight left${road}`;
    if (type.includes("slightright"))          return `Slight right${road}`;
    if (type.includes("left"))                 return `Turn left${road}`;
    if (type.includes("right"))                return `Turn right${road}`;
    if (type.includes("roundabout"))           return `Enter the roundabout${road}`;
    if (type.includes("uturn") || type.includes("turnaround")) return "Make a U-turn";
    if (type.includes("arrive") || type.includes("destination")) return "You have arrived at your destination";
    if (type.includes("straight") || type.includes("continue") || type.includes("head")) return `Continue straight${road}`;

    // Fallback: use the library's own text only if it's not a compass-direction phrase
    if (instr.text && !/\b(north|south|east|west)\b/i.test(instr.text)) return instr.text;
    return `Continue${road}`;
  }

  // 🧭 Entry point — called from a parking-area popup's "Go" button.
  // Takes only the areaId (a safe Firebase key) and looks everything else up
  // internally, rather than interpolating area name/coords into an HTML attribute.
  window.startRoute = function (areaId) {
    const area = latestAreas && latestAreas[areaId];
    if (!area || !area.lat || !area.lng) return;

    clearRoute();
    activeDestinationAreaId = areaId;
    activeDestinationName = area.name || areaId;

    // Instant feedback — show the panel with a loading state right away instead
    // of a silent 3-4 second wait while OSRM responds
    document.getElementById("routeDistance").textContent = "⏳ Calculating route…";
    document.getElementById("routeTime").textContent = "";
    document.getElementById("vehicleEtas").innerHTML = "";
    document.getElementById("altRoutesNote").textContent = "";
    document.getElementById("routeSummary").style.display = "block";
    updateDestinationStatusUI();

    const waypoints = [
      { latLng: L.latLng(userLocation.lat, userLocation.lng) },
      { latLng: L.latLng(area.lat, area.lng) }
    ];
    osrmRouter.route(waypoints, (err, routes) => {
      if (err || !routes || !routes.length) {
        document.getElementById("routeDistance").textContent = "⚠️ Route unavailable";
        document.getElementById("routeTime").textContent = "Try again shortly";
        document.getElementById("vehicleEtas").innerHTML = "";
        document.getElementById("routeSummary").style.display = "block";
        return;
      }
      foundRoutes = routes;
      drawRoutes(routes);
      selectRoute(0);
    });
    map.closePopup();
  };

  function drawRoutes(routes) {
    routeLayers.forEach(l => map.removeLayer(l));
    routeLayers = [];

    routes.forEach((route, i) => {
      const style = i === 0
        ? { color: "#0d6efd", weight: 6, opacity: 0.9 }
        : { color: "#9aa0a6", weight: 4, opacity: 0.6, dashArray: "6,8" };
      const line = L.polyline(route.coordinates, style).addTo(map);
      line.on("click", () => selectRoute(i));
      routeLayers.push(line);
    });

    map.fitBounds(L.latLngBounds(routes[0].coordinates), { padding: [40, 40] });
  }

  function selectRoute(index) {
    selectedRouteIndex = index;
    navCurrentStepIndex = 0;

    routeLayers.forEach((line, i) => {
      if (i === index) {
        line.setStyle({ color: "#0d6efd", weight: 6, opacity: 0.9, dashArray: null });
        line.bringToFront();
      } else {
        line.setStyle({ color: "#9aa0a6", weight: 4, opacity: 0.6, dashArray: "6,8" });
      }
    });

    showRouteSummary(foundRoutes[index], foundRoutes.length);
  }

  function showRouteSummary(route, totalAlternatives) {
    const km = route.summary.totalDistance / 1000;

    document.getElementById("routeDistance").textContent = `📏 ${km.toFixed(1)} km`;
    document.getElementById("routeTime").textContent =
      `⏱️ ${formatDuration(route.summary.totalTime / 60)} (drive estimate)`;

    const etaRows = Object.entries(VEHICLE_SPEEDS).map(([vehicle, speed]) => {
      const mins = (km / speed) * 60;
      const icon = vehicle === "bike" ? "🏍️" : vehicle === "car" ? "🚗" : "🚐";
      const label = vehicle.charAt(0).toUpperCase() + vehicle.slice(1);
      return `
        <div class="vehicle-row">
          <div class="v-icon">${icon}</div>
          <div class="v-info">
            <div class="v-label">${label}</div>
            <div class="v-sub">${speed} km/h avg</div>
          </div>
          <div class="v-time">${formatDuration(mins)}</div>
        </div>`;
    }).join("");
    document.getElementById("vehicleEtas").innerHTML = etaRows;

    document.getElementById("altRoutesNote").textContent =
      totalAlternatives > 1
        ? `${totalAlternatives} routes found — click a gray route on the map to switch`
        : "";

    document.getElementById("routeSummary").style.display = "block";
    updateDestinationStatusUI();
  }

  window.clearRoute = function () {
    routeLayers.forEach(l => map.removeLayer(l));
    routeLayers = [];
    foundRoutes = [];
    activeDestinationAreaId = null;
    activeDestinationName = null;
    document.getElementById("routeSummary").style.display = "none";
    document.getElementById("destStatus").innerHTML = "";
    document.getElementById("navDestStatus").innerHTML = "";
    stopNavigation();
  };

  // 🔊 Live turn-by-turn navigation — voice + visual, no Google API needed.
  // Uses the browser's built-in Web Speech API; location tracking piggybacks on
  // the single continuous geolocation watcher set up above.
  window.startNavigation = function () {
    if (!foundRoutes.length) return;
    activeNavRoute = foundRoutes[selectedRouteIndex];
    navCurrentStepIndex = 0;

    // Hide the route panel while navigating — the nav banner already shows
    // distance, instruction, live ETA and destination status, so showing both
    // at once is redundant clutter, not extra information.
    document.getElementById("routeSummary").style.display = "none";
    document.getElementById("navBanner").style.display = "block";

    const firstInstr = activeNavRoute.instructions[0];
    const firstCoord = activeNavRoute.coordinates[firstInstr.index];
    const firstDist = firstCoord
      ? distance(userLocation.lat, userLocation.lng, firstCoord.lat, firstCoord.lng) * 1000
      : undefined;
    updateNavBanner(firstInstr, firstDist, true);
    speakInstruction(firstInstr, true);

    map.setView([userLocation.lat, userLocation.lng], 17); // zoom in close for turn-by-turn
  };

  window.stopNavigation = function () {
    activeNavRoute = null;
    document.getElementById("navBanner").style.display = "none";
    document.getElementById("liveEtaNav").style.display = "none";
    if (window.speechSynthesis) speechSynthesis.cancel();
    // Bring the route panel back if there's still a route to show (e.g. stopped
    // mid-trip rather than arrived) — but not if clearRoute() already wiped it
    if (foundRoutes.length) document.getElementById("routeSummary").style.display = "block";
  };

  function updateNavBanner(instr, distMeters, isFirst) {
    document.getElementById("navInstructionText").textContent = formatInstruction(instr, isFirst);
    const distEl = document.getElementById("navDistanceText");
    if (typeof distMeters === "number") {
      distEl.textContent = formatDistance(distMeters);
      distEl.style.display = "block";
    } else {
      distEl.style.display = "none";
    }
  }

  function speakInstruction(instr, isFirst) {
    if (!window.speechSynthesis) return;
    speechSynthesis.cancel();
    speechSynthesis.speak(new SpeechSynthesisUtterance(formatInstruction(instr, isFirst)));
  }

  // Remaining distance along the route's own path (not straight-line) from the
  // nearest point to the current position, through to the destination.
  function remainingRouteDistanceKm(route) {
    let nearestIndex = 0;
    let nearestDist = Infinity;
    route.coordinates.forEach((c, i) => {
      const d = distance(userLocation.lat, userLocation.lng, c.lat, c.lng);
      if (d < nearestDist) { nearestDist = d; nearestIndex = i; }
    });

    let km = 0;
    for (let i = nearestIndex; i < route.coordinates.length - 1; i++) {
      km += distance(
        route.coordinates[i].lat, route.coordinates[i].lng,
        route.coordinates[i + 1].lat, route.coordinates[i + 1].lng
      );
    }
    return km;
  }

  // Updates the "at your current speed" ETA — shown both in the route-summary
  // panel and in the live nav banner, driven by real GPS speed.
  function updateLiveEta(route) {
    const remainingKm = remainingRouteDistanceKm(route);

    if (currentSpeedKmh && currentSpeedKmh > 2) {
      const mins = (remainingKm / currentSpeedKmh) * 60;
      const text = `🚀 At ${Math.round(currentSpeedKmh)} km/h now: ~${formatDuration(mins)} left`;

      const summaryEl = document.getElementById("liveEta");
      summaryEl.textContent = text;
      summaryEl.style.display = "block";

      const navEl = document.getElementById("liveEtaNav");
      navEl.textContent = text;
      navEl.style.display = "block";
    } else {
      document.getElementById("liveEta").style.display = "none";
      document.getElementById("liveEtaNav").style.display = "none";
    }
  }

  function checkNavProgress(route) {
    updateLiveEta(route);

    const instructions = route.instructions;
    if (!instructions || navCurrentStepIndex >= instructions.length) return;

    // Live "in X m" countdown to the next maneuver, updated on every position tick
    const nextInstr = instructions[navCurrentStepIndex];
    const stepCoord = route.coordinates[nextInstr.index];
    if (stepCoord) {
      const dMeters = distance(userLocation.lat, userLocation.lng, stepCoord.lat, stepCoord.lng) * 1000;
      updateNavBanner(nextInstr, dMeters);

      if (dMeters < 40) {
        navCurrentStepIndex++;
        if (navCurrentStepIndex < instructions.length) {
          const followingInstr = instructions[navCurrentStepIndex];
          const followingCoord = route.coordinates[followingInstr.index];
          const followingDist = followingCoord
            ? distance(userLocation.lat, userLocation.lng, followingCoord.lat, followingCoord.lng) * 1000
            : undefined;
          updateNavBanner(followingInstr, followingDist);
          speakInstruction(followingInstr);
        } else {
          updateNavBanner({ text: "You have arrived 🎉" });
          speakInstruction({ text: "You have arrived at your destination" });
          stopNavigation();
          return;
        }
      }
    }

    // Basic off-route detection → recalculate from current position
    let minDist = Infinity;
    for (const c of route.coordinates) {
      const d = distance(userLocation.lat, userLocation.lng, c.lat, c.lng) * 1000;
      if (d < minDist) minDist = d;
    }
    if (minDist > 80) {
      const destination = route.coordinates[route.coordinates.length - 1];
      osrmRouter.route(
        [
          { latLng: L.latLng(userLocation.lat, userLocation.lng) },
          { latLng: L.latLng(destination.lat, destination.lng) }
        ],
        (err, routes) => {
          if (!err && routes && routes.length) {
            foundRoutes = routes;
            drawRoutes(routes);
            selectRoute(0);
            activeNavRoute = routes[0];
            document.getElementById("navBanner").style.display = "block";
            updateNavBanner(routes[0].instructions[0], undefined, true);
            speakInstruction({ text: "Recalculating route" });
          }
        }
      );
    }
  }

  // 🧮 Distance function
  function distance(lat1, lon1, lat2, lon2) {
    const R = 6371;
    const dLat = (lat2 - lat1) * Math.PI / 180;
    const dLon = (lon2 - lon1) * Math.PI / 180;
    const a =
      Math.sin(dLat / 2) ** 2 +
      Math.cos(lat1 * Math.PI / 180) *
      Math.cos(lat2 * Math.PI / 180) *
      Math.sin(dLon / 2) ** 2;
    return R * (2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a)));
  }

  // 📍 Custom pin markers — a proper teardrop shape with a "P" mark, matching the
  // brand palette, replacing the generic default Google Maps dot icons.
  function createPinIcon(color, pulse) {
    const svg = `
      <svg width="34" height="44" viewBox="0 0 34 44" xmlns="http://www.w3.org/2000/svg">
        <path d="M17 0C7.6 0 0 7.6 0 17c0 12.4 17 27 17 27s17-14.6 17-27C34 7.6 26.4 0 17 0z" fill="${color}"/>
        <circle cx="17" cy="17" r="9" fill="white"/>
        <text x="17" y="22" font-family="Rajdhani, sans-serif" font-weight="700" font-size="13" fill="${color}" text-anchor="middle">P</text>
      </svg>`;
    return L.divIcon({
      html: `<div style="filter: drop-shadow(0 3px 3px rgba(22,32,43,0.4));${pulse ? " animation: pinPulse 1.6s ease-in-out infinite;" : ""}">${svg}</div>`,
      className: "parksense-pin",
      iconSize: [34, 44],
      iconAnchor: [17, 44],
      popupAnchor: [0, -38]
    });
  }

  const greenIcon  = createPinIcon("#2ecc71");
  const redIcon    = createPinIcon("#e74c3c");
  const yellowIcon = createPinIcon("#f1c40f", true); // pulses to draw the eye to the recommended pick

  const markers = {};
  let latestAreas = null; // cached so we can re-render when geolocation resolves after initial load

  function hideLoadingOverlay() {
    document.getElementById("loadingOverlay").classList.add("hidden");
  }
  setTimeout(hideLoadingOverlay, 6000); // fallback in case Firebase never responds

  if (db) {
  onValue(ref(db, "parkingAreas"), snapshot => {
    const areas = snapshot.val();
    if (!areas) return;
    latestAreas = areas;
    renderAreas(areas);
    renderAreasList(areas);
    updateDestinationStatusUI();
    fitMapToEverything();
    hideLoadingOverlay();
  });
  } else {
    hideLoadingOverlay(); // Firebase failed to init — don't leave the user stuck on a loading screen
  }

  function renderAreas(areas) {

    let nearestAreaId = null;
    let nearestDistance = Infinity;

    // 🔍 Find nearest available area
    for (const areaId in areas) {
      const area = areas[areaId];
      if (!area.lat || !area.lng || !area.slots) continue;

      const hasFree = Object.values(area.slots).some(s => s.status === "free");
      if (!hasFree) continue;

      const d = distance(userLocation.lat, userLocation.lng, area.lat, area.lng);
      if (d < nearestDistance) {
        nearestDistance = d;
        nearestAreaId = areaId;
      }
    }

    // 📍 Render markers
    for (const areaId in areas) {
      const area = areas[areaId];
      if (!area.lat || !area.lng || !area.slots) continue;

      let counts = {
        bike: { free: 0, total: 0 },
        car:  { free: 0, total: 0 },
        van:  { free: 0, total: 0 }
      };

      for (const s in area.slots) {
        const slot = area.slots[s];
        counts[slot.type].total++;
        if (slot.status === "free") counts[slot.type].free++;
      }

      const anyFree = counts.bike.free || counts.car.free || counts.van.free;
      const isNearest = areaId === nearestAreaId;

      const occupancyRow = (icon, label, c) => {
        const pct = c.total > 0 ? Math.round((c.free / c.total) * 100) : 0;
        const barColor = c.free > 0 ? "#2ecc71" : "#e74c3c";
        const status = formatSlotStatus(c.free, c.total);
        return `
          <div class="popup-row">
            <span class="popup-icon">${icon}</span>
            <span class="popup-label">${label}</span>
            <div class="popup-bar-track"><div class="popup-bar-fill" style="width:${pct}%; background:${barColor}"></div></div>
            <span class="popup-count ${status.cls}">${status.text}</span>
          </div>`;
      };

      const popup = `
        <b>${escapeHtml(area.name || areaId)}</b>
        <div class="popup-body">
          ${occupancyRow("🏍️", "Bike", counts.bike)}
          ${occupancyRow("🚗", "Car", counts.car)}
          ${occupancyRow("🚐", "Van", counts.van)}
        </div>

        ${isNearest ? `<div class="recommend">⭐ RECOMMENDED (Nearest Available)</div>` : ""}

        <button class="navigate-btn" onclick="startRoute('${escapeHtml(areaId)}')">
          🧭 Go
        </button>
      `;

      const icon = isNearest ? yellowIcon : (anyFree ? greenIcon : redIcon);

      if (!markers[areaId]) {
        markers[areaId] = L.marker([area.lat, area.lng], { icon })
          .addTo(map)
          .bindPopup(popup);
      } else {
        markers[areaId]
          .setLatLng([area.lat, area.lng])
          .setIcon(icon)
          .setPopupContent(popup);
      }
    }
  } // end renderAreas
</script>
